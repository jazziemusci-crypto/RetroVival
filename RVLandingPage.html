<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Vival Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PASSWORD GATE -->
  <div id="gate" class="gate">
    <div class="gate-box">
      <h1>🔒 Retro Vival</h1>
      <p>Enter admin password to continue</p>
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
      <button id="unlockBtn">Enter</button>
      <p id="gateError" class="error"></p>
    </div>
  </div>

  <!-- MAIN APP (hidden until unlocked) -->
  <div id="app" class="app hidden">

    <header class="topbar">
      <div class="brand">💊 Retro Vival</div>
      <nav class="nav">
        <button class="nav-btn active" data-view="invoices">Individual Invoice Links</button>
        <button class="nav-btn" data-view="admin">Admin Dashboard</button>
        <button class="nav-btn" data-view="forms">Forms</button>
        <button class="nav-btn" data-view="orders">Order Management</button>
        <button class="nav-btn" data-view="settings">⚙️ Manage Links</button>
      </nav>
      <button id="lockBtn" class="lock-btn" title="Lock portal">🔒 Lock</button>
    </header>

    <main class="content">

      <!-- INVOICES VIEW -->
      <section id="view-invoices" class="view active">
        <div class="split">
          <aside class="invoice-list" id="invoiceList"></aside>
          <div class="preview-pane">
            <div id="invoicePlaceholder" class="placeholder">
              👈 Select an invoice from the list to preview it here
            </div>
            <div id="invoiceFrames"></div>
          </div>
        </div>
      </section>

      <!-- FORMS VIEW -->
      <section id="view-forms" class="view">
        <iframe id="formsFrame" class="frame"></iframe>
      </section>

      <!-- ADMIN / ORDERS: these just open new tabs, no content view needed -->

      <!-- SETTINGS / MANAGE LINKS VIEW -->
      <section id="view-settings" class="view">
        <div class="settings-wrap">
          <h2>Manage Links</h2>
          <p class="settings-note">
            Changes here save to THIS browser only. To make changes visible on every device,
            edit <code>config.js</code> and re-upload to GitHub instead.
          </p>

          <label>Admin Dashboard link (opens new tab)</label>
          <input type="text" id="input-admin" placeholder="https://docs.google.com/spreadsheets/d/.../edit">

          <label>Order Management link (opens new tab)</label>
          <input type="text" id="input-orders" placeholder="https://docs.google.com/spreadsheets/d/.../edit#gid=...">

          <label>Forms link (previews inline — remember to add ?embedded=true)</label>
          <input type="text" id="input-forms" placeholder="https://docs.google.com/forms/d/e/.../viewform?embedded=true">

          <h3>Invoices</h3>
          <div id="invoiceEditRows"></div>
          <button id="addInvoiceRow" class="secondary-btn">+ Add Invoice</button>

          <div class="settings-actions">
            <button id="saveSettings" class="save-btn">💾 Save Changes</button>
            <button id="resetSettings" class="reset-btn">Reset to config.js defaults</button>
          </div>
          <p id="saveMsg" class="save-msg"></p>
        </div>
      </section>

    </main>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
