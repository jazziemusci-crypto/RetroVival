<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Vival Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PASSWORD GATE -->
  <div id="gate" class="gate">
    <div class="gate-box">
      <h1>🔒 Retro Vival</h1>
      <p>Enter admin password to continue</p>
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
      <button id="unlockBtn">Enter</button>
      <p id="gateError" class="error"></p>
    </div>
  </div>

  <!-- MAIN APP (hidden until unlocked) -->
  <div id="app" class="app hidden">

    <header class="topbar">
      <div class="brand">💊 Retro Vival</div>
      <nav class="nav">
        <button class="nav-btn active" data-view="invoices">Individual Invoice Links</button>
        <button class="nav-btn" data-view="admin">Admin Dashboard</button>
        <button class="nav-btn" data-view="forms">Forms</button>
        <button class="nav-btn" data-view="orders">Order Management</button>
      </nav>
      <button id="lockBtn" class="lock-btn" title="Lock portal">🔒 Lock</button>
    </header>

    <main class="content">

      <!-- INVOICES VIEW -->
      <section id="view-invoices" class="view active">
        <div class="split">
          <aside class="invoice-list" id="invoiceList"></aside>
          <div class="preview-pane">
            <div id="invoicePlaceholder" class="placeholder">
              👈 Select an invoice from the list to preview it here
            </div>
            <div id="invoiceFrames"></div>
          </div>
        </div>
      </section>

      <!-- FORMS VIEW -->
      <section id="view-forms" class="view">
        <iframe id="formsFrame" class="frame"></iframe>
      </section>

      <!-- ADMIN / ORDERS: these just open new tabs, no content view needed -->

    </main>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
